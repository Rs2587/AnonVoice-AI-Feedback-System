<!DOCTYPE html>
<html>

<head>

    <title>AnonVoice</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        AnonVoice Feedback Portal
                    </h2>

                    <p class="text-center text-muted">
                        Submit your complaint anonymously. Your identity will remain hidden.
                    </p>

                    <form action="/submit" method="POST">

                        

                        <label class="form-label">
                            Feedback / Complaint
                        </label>

                        <textarea
                            class="form-control mb-3"
                            rows="5"
                            name="message"
                            placeholder="Enter your feedback or complaint..."
                            required
                        ></textarea>

                        <button
                            class="btn btn-primary w-100"
                            type="submit"
                        >
                            Submit Feedback
                        </button>

                    </form>

                    <hr class="my-4">

                    <div class="text-center">

                        <h5>
                            Already Submitted a Complaint?
                        </h5>

                        <p class="text-muted">
                            Use your Anonymous ID to track complaint progress.
                        </p>

                        <a
                            href="/check-status"
                            class="btn btn-success"
                        >
                            Check Complaint Status
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
